<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrati - Allevamento</title>
    <style>
        body{
            font-family: Arial, Arial, Arial;
            background: rgba(37, 230, 255, 0.2);
            min-height: 65vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h2{margin-bottom: 24px; color: black;}
        #registerForm{
            background: white;
            padding: 32px 28px 24px 28px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(44, 62, 80, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 320px;
        }
        #registerForm input,
        #registerForm select{
            margin: 10px 0;
            padding: 10px 12px;
            width: 100%;
            border: 1px solid lightgrey;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(37, 230, 255, 0.05);
            transition: border 0.2s;
        }
        #registerForm input:focus,
        #registerForm select:focus{border: 1.5px solid black; outline: none; background: white;}
        #registerForm button{
            margin-top: 16px;
            padding: 10px 0;
            width: 100%;
            background: blue;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #registerForm button:hover{background: darkblue;}
        #message{
            color: red;
            margin-top: 12px;
            min-height: 20px;
            text-align: center;
        }
        p{margin-top: 24px; color: black;}
        a{color: blue; text-decoration: none; font-weight: 500;}
        a:hover{text-decoration: underline;}
    </style>
</head>
<body>
    <h2>Registrazione</h2>
    <form id="registerForm">
        <input type="text" id="username" placeholder="Username" required><br>
        <input type="email" id="email" placeholder="Email" required><br>
        <input type="password" id="password" placeholder="Password" required><br>
        <select id="ruolo">
            <option value="ALLEVATORE">Allevatore</option>
            <option value="ADMIN">Amministratore</option>
        </select><br>
        <button type="submit">Registrati</button>
    </form>

    <div id="message"></div>

    <p>Hai già un account? <a href="login.html">Accedi qui</a></p>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e){
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const ruolo = document.getElementById('ruolo').value;

            const response = await fetch('registrazione.php',{method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, email, password, ruolo})});
            const result = await response.json();

            if(result.success){
                alert(result.message || 'Registrazione completata!');
                window.location.href = 'login.html';  // Dopo registrazione vai al login
            }
            else
            {
                document.getElementById('message').textContent = result.message || 'Errore registrazione';
            }
        });
    </script>
</body>
</html>
